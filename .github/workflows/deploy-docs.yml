name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: docs-site
        run: pnpm astro build --base /docs/

      - name: Create root redirect
        run: |
          mkdir -p docs-site/dist-root/docs
          cp -r docs-site/dist/* docs-site/dist-root/docs/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/docs/"></head></html>' > docs-site/dist-root/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site/dist-root
          cname: swarm.snaha.net
          keep_files: true
